name: Sync to public mirror

on:
  push:
    branches: [main, deployment]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to public mirror
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/SensorsConnect/IoT-Agentic-Search-Engine.git
          git push public HEAD:${GITHUB_REF_NAME} --force-with-lease
